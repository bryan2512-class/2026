<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryan's Classroom</title>
    <style>
        /* [总结1: 基础外观] 引入渐变背景以增强玻璃通透感 */
        body { 
            font-family: -apple-system, sans-serif; 
            background: linear-gradient(135deg, #f0f2f5 0%, #dbeafe 100%); 
            background-attachment: fixed;
            padding: 20px; 
            color: #333; 
            max-width: 800px; 
            margin: 0 auto; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        h1 { text-align: center; color: #1c1e21; font-weight: 800; }
        
        /* [玻璃效果通用类] */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* [总结2: Level 1 大标题 - 蓝色科目条] */
        .subject-header { 
            background: rgba(0, 122, 255, 0.8); 
            color: white; padding: 15px; border-radius: 12px; margin-top: 20px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 12px rgba(0,122,255,0.2);
        }
        
        /* [总结3: Level 2 副标题 - 灰色章节条] */
        .theme-section { 
            margin: 10px 0 0 15px; font-weight: bold; color: #4b4f56; 
            cursor: pointer; background: rgba(228, 230, 235, 0.7); 
            padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; 
            border-left: 4px solid #007aff;
        }

        /* [新增: Level 3 子标题 - 浅色导航条] */
        .sub-topic-header {
            margin: 8px 0 0 30px; font-weight: 600; color: #555;
            cursor: pointer; background: rgba(255, 255, 255, 0.4);
            padding: 10px; border-radius: 8px; display: flex; justify-content: space-between;
            border: 1px dashed rgba(0, 122, 255, 0.2);
        }
        
        /* [总结4: Level 4 题目卡片] */
        .topic-card { 
            border-radius: 12px; padding: 15px; margin: 10px 0 10px 45px; 
            cursor: pointer; border-left: 5px solid #28a745; 
        }
        
        /* [总结5: 题目详情区] */
        .quiz-area { background: rgba(255, 251, 230, 0.7); padding: 15px; border-radius: 8px; border: 1px solid #ffe58f; margin-top: 10px; cursor: default; }
        
        /* [总结6: 嵌入容器] */
        .embed-container { position: relative; width: 100%; padding-bottom: 65%; height: 0; margin: 10px 0; border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); }
        .embed-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* [总结7: 绿色按钮] */
        .btn-lesson { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; transition: 0.3s; }
        .btn-lesson:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        /* [总结8: 隐藏工具] */
        .hidden { display: none; }

        /* [总结9: 底部版权水印] */
        .watermark { text-align: center; margin-top: auto; padding: 40px 0 20px 0; color: #888; font-size: 11px; }
    </style>
</head>
<body>

    <h1>📚 Bryan's Classroom</h1>
    <div id="course-menu"></div>

    <div class="watermark">
        <strong>The Usage Rights Belong To Bryan And Cannot Be Shared Without Permission</strong>
    </div>

    <script>
        /**
         * [代码解释：四层数据仓库]
         * 结构：Subject > Theme > SubTopic > Topic
         */
        const schoolData = [
            {
                name: "F4 ADDITIONAL MATHEMATICS", // Level 1 大标题
                themes: [
                    {
                        name: "F4 C1: FUNGSI", // Level 2 副标题
                        subTopics: [
                            {
                                name: "1.1 Concept of Functions", // Level 3 子标题
                                topics: [
                                    { 
                                        id: "f4_math_01_q1", // Level 4 小章节/题目
                                        title: "Question 1",
                                        quiz: "", 
                                        quizImageId: "", 
                                        driveId: ""
                                    }
                                ]
                            }，

                            {
                                name: "1.1 Concept of Functions", // Level 3 子标题
                                topics: [
                                    { 
                                        id: "f4_math_01_q2", // Level 4 小章节/题目
                                        title: "Question 2",
                                        quiz: "", 
                                        quizImageId: "", 
                                        driveId: ""
                                    }
                                ]
                            }
                        ]
                    }
                ]
            }
        ];

        /**
         * [代码解释：渲染大厨 - 已重构支持四层循环]
         */
        function renderMenu() {
            const menu = document.getElementById('course-menu');
            let html = '';

            schoolData.forEach((sub, sIndex) => {
                // Level 1: Subject
                html += `
                    <div class="subject-header" onclick="toggleSection('sub-${sIndex}')">
                        <span>📂 ${sub.name}</span> <span>Expand/Collapse ▾</span>
                    </div>
                    <div id="sub-${sIndex}" class="hidden">`;
                
                sub.themes.forEach((theme, tIndex) => {
                    // Level 2: Theme
                    html += `
                        <div class="theme-section glass-panel" onclick="toggleSection('theme-${sIndex}-${tIndex}')">
                            📖 ${theme.name} <span>▾</span>
                        </div>
                        <div id="theme-${sIndex}-${tIndex}" class="hidden">`;
                    
                    theme.subTopics.forEach((subTopic, stIndex) => {
                        // Level 3: SubTopic (新增层级)
                        html += `
                            <div class="sub-topic-header glass-panel" onclick="toggleSection('st-${sIndex}-${tIndex}-${stIndex}')">
                                📑 ${subTopic.name} <span>▾</span>
                            </div>
                            <div id="st-${sIndex}-${tIndex}-${stIndex}" class="hidden">`;

                        subTopic.topics.forEach(topic => {
                            // Level 4: Topic / Question
                            const imageEmbed = topic.quizImageId 
                                ? `<div class="embed-container"><iframe src="https://drive.google.com/file/d/${topic.quizImageId}/preview"></iframe></div>` 
                                : '';

                            const videoSection = topic.driveId
                                ? `<button class="btn-lesson" onclick="toggleVideo('${topic.id}')">🎬 Watch The Lesson</button>
                                   <div id="video-zone-${topic.id}" class="hidden">
                                       <div class="embed-container">
                                           <iframe src="https://drive.google.com/file/d/${topic.driveId}/preview" allowfullscreen></iframe>
                                       </div>
                                   </div>`
                                : '';

                            html += `
                                <div class="topic-card glass-panel">
                                    <div onclick="toggleSection('quiz-${topic.id}')" style="font-weight:bold; display:flex; justify-content:space-between;">
                                        <span>📄 ${topic.title}</span> <span>Show Details ▾</span>
                                    </div>
                                    <div id="quiz-${topic.id}" class="hidden">
                                        <div class="quiz-area" onclick="event.stopPropagation()">
                                            <p><strong>Content：</strong><br>${topic.quiz}</p>
                                            ${imageEmbed}
                                            ${videoSection}
                                        </div>
                                    </div>
                                </div>`;
                        });
                        html += `</div>`; // 关闭 SubTopic
                    });
                    html += `</div>`; // 关闭 Theme
                });
                html += `</div>`; // 关闭 Subject
            });
            menu.innerHTML = html;
        }

        /**
         * [代码解释：交互逻辑]
         */
        function toggleSection(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('hidden');
        }

        function toggleVideo(topicId) {
            const zone = document.getElementById('video-zone-' + topicId);
            if (zone) zone.classList.toggle('hidden');
        }

        renderMenu();
    </script>
</body>
</html>
